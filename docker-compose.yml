version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hunter-irrigation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vendure}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-vendure}
      # Performance tuning
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    # Use custom config
    # command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "127.0.0.1:5432:5432"  # Restricted to localhost only for security
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vendure}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - hunter-irrigation-network

  redis:
    image: redis:7-alpine
    container_name: hunter-irrigation-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # Restricted to localhost only for security
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - hunter-irrigation-network

  vendure-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: hunter-irrigation-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vendure}
      DB_USERNAME: ${POSTGRES_USER:-vendure}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-superadmin}
      API_HOST: ${API_HOST:-https://hunterirrigationsupply.com}
      COOKIE_SECRET: ${COOKIE_SECRET:-changeme-secret-key}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    ports:
      - "127.0.0.1:3000:3000"  # Expose to localhost for Caddy
    networks:
      - hunter-irrigation-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  vendure-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.worker
    container_name: hunter-irrigation-worker
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vendure}
      DB_USERNAME: ${POSTGRES_USER:-vendure}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vendure-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[n]ode dist/worker.js' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - hunter-irrigation-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  storefront:
    build:
      context: ./apps/storefront
      dockerfile: Dockerfile
      args:
        # Pass build-time environment variables (required for NEXT_PUBLIC_ vars)
        # These are bundled into JavaScript during build, not at runtime
        NEXT_PUBLIC_VENDURE_API_URL: ${NEXT_PUBLIC_VENDURE_API_URL:-https://hunterirrigationsupply.com}
        NEXT_PUBLIC_US_CHANNEL_TOKEN: ${NEXT_PUBLIC_US_CHANNEL_TOKEN:-us-channel-token}
        NEXT_PUBLIC_CA_CHANNEL_TOKEN: ${NEXT_PUBLIC_CA_CHANNEL_TOKEN:-ca-channel-token}
    container_name: hunter-irrigation-storefront
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      SERVER_API_URL: http://hunter-irrigation-api:3000
      # Note: NEXT_PUBLIC_ vars are set at build time via build args above
      # Runtime env vars won't affect already-built JavaScript
    depends_on:
      vendure-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001', (r) => {process.exit(r.statusCode < 500 ? 0 : 1)}).on('error', () => process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - hunter-irrigation-network
    ports:
      - "127.0.0.1:3001:3001"  # Expose to localhost for Caddy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # CRITICAL: Do NOT mount volumes in production - they overwrite the built .next directory
    # The Dockerfile builds the app and copies .next/standalone and .next/static into the image
    # Mounting ./apps/storefront:/app would overwrite these built artifacts, causing 400 errors
    # volumes:
    #   - ./apps/storefront:/app
    #   - /app/node_modules
    #   - /app/.next

  remix-storefront:
    build:
      context: ./apps/remix-storefront
      dockerfile: Dockerfile
      args:
        VENDURE_API_URL: ${VENDURE_API_URL:-http://vendure-api:3000}
        PUBLIC_VENDURE_API_URL: ${PUBLIC_VENDURE_API_URL:-https://hunterirrigationsupply.com}
        US_CHANNEL_TOKEN: ${US_CHANNEL_TOKEN:-e8feb84eb1c9a971babd442996f62ed2}
        CA_CHANNEL_TOKEN: ${CA_CHANNEL_TOKEN:-829a8999792172126c5af5458a47caa2}
        SESSION_SECRET: ${SESSION_SECRET:-changeme-secret-key}
        NODE_ENV: ${NODE_ENV:-production}
    container_name: hunter-irrigation-remix-storefront
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8002
      VENDURE_API_URL: http://vendure-api:3000
      PUBLIC_VENDURE_API_URL: ${PUBLIC_VENDURE_API_URL:-https://hunterirrigationsupply.com}
      US_CHANNEL_TOKEN: ${US_CHANNEL_TOKEN:-e8feb84eb1c9a971babd442996f62ed2}
      CA_CHANNEL_TOKEN: ${CA_CHANNEL_TOKEN:-829a8999792172126c5af5458a47caa2}
      SESSION_SECRET: ${SESSION_SECRET:-changeme-secret-key}
    depends_on:
      vendure-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8002', (r) => {process.exit(r.statusCode < 500 ? 0 : 1)}).on('error', () => process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - hunter-irrigation-network
    ports:
      - "127.0.0.1:8002:8002"  # Expose to localhost for Caddy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: hunter-irrigation-caddy
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  hunter-irrigation-network:
    driver: bridge

