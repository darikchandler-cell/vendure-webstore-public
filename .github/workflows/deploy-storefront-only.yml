name: Deploy Storefront Only

on:
  workflow_dispatch: # Manual trigger only
    inputs:
      reason:
        description: 'Reason for deployment'
        required: true
        default: 'Storefront update'

jobs:
  deploy-storefront:
    name: Quick Storefront Deployment
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy storefront only
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/hunter-irrigation
            git pull origin main
            echo "🔨 Rebuilding storefront container..."
            docker compose build storefront
            echo "🔄 Restarting storefront..."
            docker compose up -d storefront
            sleep 20
            echo "✅ Storefront deployment complete!"
            docker compose ps storefront

