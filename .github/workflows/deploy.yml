name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/hunter-irrigation
            git pull origin main
            chmod +x infra/execute-deployment.sh
            ./infra/execute-deployment.sh
      
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/hunter-irrigation
            echo "📊 Container Status:"
            docker compose ps
            echo ""
            echo "🌐 Testing endpoints..."
            curl -s -o /dev/null -w "Storefront: HTTP %{http_code}\n" http://localhost:3001 || echo "Storefront: Failed"
            curl -s -o /dev/null -w "API: HTTP %{http_code}\n" http://localhost:3000/shop-api || echo "API: Failed"

